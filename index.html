<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Dancing+Script:wght@400&display=swap" rel="stylesheet">

<style>
body{
  margin:0;
  min-height:100vh;
  display:flex;
  flex-direction:column;
  align-items:center;
  text-align:center;
  font-family:'Dancing Script',cursive;
  background:#fff0f5;
  overflow-x:hidden;
  color:#ff4f81;
  transition:2s;
}

/* candle */
#candle{
  font-size:110px;
  cursor:pointer;
  margin-top:60px;
  transition:1s;
}

/* title */
h1{
  font-family:'Great Vibes',cursive;
  font-size:60px;
  display:none;
}

/* date */
#date{
  font-family:'Great Vibes',cursive;
  font-size:38px;
  display:none;
}

/* polaroid */
.polaroid{
  display:none;
  background:white;
  padding:12px 12px 25px 12px;
  border-radius:4px;
  box-shadow:0 10px 25px rgba(0,0,0,0.3);
  transform:rotate(-3deg);
  margin-top:25px;
}
.polaroid img{
  width:150px;
  height:150px;
  object-fit:cover;
  margin-bottom:10px;
}

#message{
  font-size:24px;
  line-height:1.7;
  max-width:800px;
  margin:auto;
}

/* send message button */
#openGuest{
  display:none;
  padding:12px 25px;
  border:none;
  border-radius:25px;
  background:linear-gradient(45deg,#ff7aa8,#ff4f81);
  color:white;
  font-size:18px;
  cursor:pointer;
  margin-top:20px;
}

/* guestbook overlay */
#messagePage{
  position:fixed;
  top:0;
  left:0;
  width:100%;
  height:100%;
  background:black;
  color:white;
  display:none;
  flex-direction:column;
  align-items:center;
  overflow-y:auto;
  padding-top:40px;
}

/* cross button */
#closeCross{
  position: absolute;
  top: 15px;
  left: 15px;
  font-size: 30px;
  cursor: pointer;
  color: white;
  font-weight: bold;
  user-select: none;
}
#closeCross:hover{
  color: #ff4f81;
}

/* inputs */
input{
  width:250px;
  padding:10px;
  margin:10px;
  border-radius:10px;
  border:none;
}
#messages{
  max-width:600px;
  margin-top:30px;
  text-align:left;
}
#messages p{
  background:#222;
  padding:12px;
  border-radius:10px;
  margin:10px 0;
}

/* hearts */
.heart{
  position:fixed;
  bottom:-20px;
  animation:float 6s linear infinite;
}
@keyframes float{
  0%{transform:translateY(0);}
  100%{transform:translateY(-100vh);}
}

/* fireworks */
canvas{
  position:fixed;
  top:0;
  left:0;
  pointer-events:none;
}
</style>
</head>

<body>

<div id="date">8th March 2026</div>

<p id="tap">Tap the candle to blow it out 🕯️</p>

<div id="candle">🕯️</div>

<h1 id="title">Happy 16th Birthday Chen Ann</h1>

<div class="polaroid" id="polaroid">
  <img src="photo.jpg">
  <div id="message"></div>
</div>

<button id="openGuest">Send Message 💌</button>

<audio id="music" src="music.mp3"></audio>
<canvas id="fireworks"></canvas>

<!-- MESSAGE PAGE -->
<div id="messagePage">
  <div id="closeCross" onclick="closePage()">×</div>
  <h2>Leave a Message for Chen Ann 💌</h2>
  <input id="name" placeholder="Your name">
  <input id="msg" placeholder="Your message">
  <button onclick="sendMessage()">Send</button>
  <div id="messages"></div>
</div>

<script type="module">
/* Firebase */
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-app.js";
import { getAnalytics } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-analytics.js";
import { getFirestore, collection, addDoc, getDocs } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyBpBzV5MhSTSFGvwIXfSaeChmX5ZK1nFJM",
  authDomain: "chen-ann-birthday.firebaseapp.com",
  projectId: "chen-ann-birthday",
  storageBucket: "chen-ann-birthday.firebasestorage.app",
  messagingSenderId: "211715576710",
  appId: "1:211715576710:web:c16b8171d3937956899207",
  measurementId: "G-E64XDLFE40"
};

const app = initializeApp(firebaseConfig);
getAnalytics(app);
const db = getFirestore(app);

/* elements */
const candle=document.getElementById("candle");
const music=document.getElementById("music");
const title=document.getElementById("title");
const message=document.getElementById("message");
const polaroid=document.getElementById("polaroid");
const guestBtn=document.getElementById("openGuest");
const date=document.getElementById("date");

/* 3-line letter */
const text=`Hi Chen Ann — how does it feel to finally be 16? You're basically halfway to 32 haha.

I hope this year brings you lots of fun, laughter, and beautiful memories that you'll always remember.

Wishing you good health, happiness, and the brightest days ahead. — Thulasi`;

let i=0;
function type(){
  if(i<text.length){
    message.innerHTML+=text.charAt(i);
    i++;
    setTimeout(type,35);
  }
}

/* candle click */
candle.onclick=()=>{
  candle.style.opacity="0";
  setTimeout(()=>{
    candle.style.display="none";
    document.getElementById("tap").style.display="none";
    document.body.style.background="url('bg.jpg') center/cover";
    date.style.display="block";
    title.style.display="block";
    polaroid.style.display="block";
    music.play(); // play music after candle
    type();
    createHearts();
    startFireworks();
    guestBtn.style.display="block";
    loadMessages(); // preload messages
  },1200);
};

/* open guestbook overlay */
guestBtn.onclick=()=>{
  document.getElementById("messagePage").style.display="flex";
  loadMessages(); // refresh messages
};

/* close overlay */
window.closePage=()=>{
  document.getElementById("messagePage").style.display="none";
};

/* send message */
window.sendMessage = async function(){
  const name=document.getElementById("name").value.trim();
  const msg=document.getElementById("msg").value.trim();
  if(name && msg){
    await addDoc(collection(db,"messages"),{name,msg});
    document.getElementById("name").value="";
    document.getElementById("msg").value="";
    loadMessages();
  }
};

/* load messages */
async function loadMessages(){
  const querySnapshot=await getDocs(collection(db,"messages"));
  const container=document.getElementById("messages");
  container.innerHTML="";
  querySnapshot.forEach(doc=>{
    const p=document.createElement("p");
    p.textContent=doc.data().name+": "+doc.data().msg;
    container.appendChild(p);
  });
}

/* hearts */
function createHearts(){
  setInterval(()=>{
    const heart=document.createElement("div");
    heart.className="heart";
    heart.innerHTML="💖";
    heart.style.left=Math.random()*100+"%";
    heart.style.fontSize=(Math.random()*25+15)+"px";
    document.body.appendChild(heart);
    setTimeout(()=>heart.remove(),6000);
  },400);
}

/* fireworks */
const canvas=document.getElementById("fireworks");
const ctx=canvas.getContext("2d");
canvas.width=window.innerWidth;
canvas.height=window.innerHeight;
let particles=[];
function startFireworks(){
  setInterval(()=>{
    for(let i=0;i<60;i++){
      particles.push({
        x:canvas.width/2,
        y:canvas.height/2,
        vx:(Math.random()-0.5)*7,
        vy:(Math.random()-0.5)*7,
        life:100
      });
    }
  },800);
  animate();
}
function animate(){
  ctx.clearRect(0,0,canvas.width,canvas.height);
  particles.forEach(p=>{
    ctx.fillStyle="#ff9ecb";
    ctx.beginPath();
    ctx.arc(p.x,p.y,3,0,Math.PI*2);
    ctx.fill();
    p.x+=p.vx;
    p.y+=p.vy;
    p.life--;
  });
  particles=particles.filter(p=>p.life>0);
  requestAnimationFrame(animate);
}
</script>

</body>
</html>
